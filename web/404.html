<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cargando...</title>
  <script type="text/javascript">
    // De GitHub Pages Single Page Apps para Flutter
    var segmentCount = 1; // Ajusta según el nivel de subdirectorios
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/index.html?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
